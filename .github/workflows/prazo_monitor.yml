name: Monitor de Prazos

on:
  schedule:
    - cron: '0 15 * * *'  # 12h BRT (UTC-3) todos os dias
  workflow_dispatch:

jobs:
  monitor-prazos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Executar Monitor de Prazos
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python scripts/prazo_monitor.py
