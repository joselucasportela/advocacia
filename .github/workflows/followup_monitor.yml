name: Monitor de Follow-up de Clientes

on:
  schedule:
    - cron: '0 12 * * 5'  # Sexta-feira às 9h BRT (12h UTC)
  workflow_dispatch:

jobs:
  followup-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Executar Monitor de Follow-up
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python scripts/followup_monitor.py
