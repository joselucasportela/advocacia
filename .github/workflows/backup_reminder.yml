name: Lembrete Mensal de Backup

on:
  schedule:
    # Primeira segunda-feira de cada mês às 9h BRT (12h UTC)
    # Aproximação: dia 1-7 de cada mês, segunda-feira
    - cron: '0 12 1-7 * 1'
  workflow_dispatch:

jobs:
  backup-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enviar lembrete de backup
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python scripts/backup_reminder.py
